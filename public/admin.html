<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin · Samar Piercing</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #F5F7FB; color: #1A1F36; padding: 2rem; }
    .login-container { max-width: 420px; margin: 6rem auto; }
    .login-card { background: white; border-radius: 28px; padding: 2rem; box-shadow: 0 8px 20px rgba(0,0,0,0.05); border: 1px solid #E6EDF4; }
    .login-card h2 { font-size: 1.6rem; margin-bottom: 1.5rem; color: #1A1F36; }
    .login-card input { width: 100%; padding: 0.9rem; border: 1px solid #DFE6EF; border-radius: 14px; margin-bottom: 1rem; }
    .login-card button { background: #1A1F36; color: white; border: none; border-radius: 14px; padding: 0.9rem; width: 100%; cursor: pointer; }
    .error-msg { color: #E5484D; font-size: 0.8rem; text-align: center; margin-top: 1rem; }
    .admin-panel { display: none; max-width: 1400px; margin: 0 auto; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .admin-header h1 { font-size: 1.8rem; font-weight: 700; }
    .logout-btn { background: #F0F2F5; border: none; padding: 0.6rem 1.2rem; border-radius: 40px; cursor: pointer; }
    .products-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin: 2rem 0 1.5rem; }
    .search-box { display: flex; align-items: center; background: white; border: 1px solid #E2E8F0; border-radius: 40px; padding: 0.4rem 1rem; width: 260px; }
    .search-box i { color: #94A3B8; margin-right: 8px; }
    .search-box input { border: none; background: transparent; width: 100%; outline: none; }
    .filter-buttons { display: flex; gap: 0.8rem; }
    .filter-buttons button { background: white; border: 1px solid #E2E8F0; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; }
    .filter-buttons .active { background: #1A1F36; color: white; border-color: #1A1F36; }
    .products-table-container { background: white; border-radius: 24px; border: 1px solid #EDF2F7; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; padding: 1rem; background: #F8FAFE; font-weight: 600; border-bottom: 1px solid #EDF2F7; }
    td { padding: 1rem; border-bottom: 1px solid #F0F4F9; vertical-align: middle; }
    .product-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 12px; }
    .status-badge { display: inline-block; background: #E6F7EC; color: #2E7D32; padding: 0.2rem 0.6rem; border-radius: 40px; font-size: 0.7rem; }
    .status-hidden { background: #FFECEE; color: #C62828; }
    .action-icons button { background: none; border: none; cursor: pointer; margin: 0 4px; color: #64748B; }
    .action-icons .edit-btn:hover { color: #3B82F6; }
    .action-icons .delete-btn:hover { color: #E5484D; }
    .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1.5rem; }
    .add-product-card { background: white; border-radius: 28px; border: 1px solid #EDF2F7; padding: 1.8rem; margin: 2rem 0; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
    .field-group label { font-weight: 600; font-size: 0.8rem; display: block; margin-bottom: 0.4rem; }
    .field-group input, .field-group select, .field-group textarea { width: 100%; padding: 0.7rem 1rem; border: 1px solid #E2E8F0; border-radius: 16px; font-family: inherit; }
    .media-upload { border: 1px dashed #CBD5E1; border-radius: 20px; padding: 1rem; text-align: center; background: #F8FAFE; cursor: pointer; margin-top: 0.5rem; }
    .image-previews { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-top: 0.8rem; }
    .preview-item { position: relative; width: 80px; height: 80px; border-radius: 12px; overflow: hidden; border: 1px solid #E2E8F0; background: white; }
    .preview-item img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item .remove-img { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.6); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; cursor: pointer; }
    .submit-btn { background: #1A1F36; color: white; border: none; border-radius: 40px; padding: 0.8rem 1.8rem; font-weight: 600; cursor: pointer; margin-top: 1.5rem; width: auto; }
    .edit-drawer { display: none; position: fixed; top: 0; right: 0; width: 100%; max-width: 500px; height: 100%; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.1); z-index: 1000; padding: 2rem; overflow-y: auto; }
    .edit-drawer.open { display: block; }
    .edit-drawer .close-edit { float: right; background: none; border: none; font-size: 1.4rem; cursor: pointer; }
    @media (max-width: 700px) { body { padding: 1rem; } .products-header { flex-direction: column; align-items: stretch; } .search-box { width: 100%; } }
  </style>
</head>
<body>

<div class="login-container" id="loginContainer">
  <div class="login-card">
    <h2>Admin login</h2>
    <input type="password" id="loginPassword" placeholder="Enter password">
    <button id="loginBtn">Access dashboard</button>
    <div id="loginError" class="error-msg"></div>
  </div>
</div>

<div class="admin-panel" id="adminPanel">
  <div class="admin-header">
    <h1><i class="fas fa-gem"></i> Products</h1>
    <button class="logout-btn" id="logoutBtn">Logout</button>
  </div>

  <div class="products-header">
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search products..."></div>
    <div class="filter-buttons"><button data-filter="all" class="active">All products</button><button data-filter="published">Published</button><button data-filter="hidden">Hidden</button></div>
  </div>

  <div class="products-table-container">
    <table><thead><tr><th>Product</th><th>Status</th><th>Price</th><th>Inventory</th><th></th></tr></thead><tbody id="productsTableBody"><tr><td colspan="5">Loading...</td></tr></tbody></table>
  </div>
  <div class="pagination" id="pagination"></div>

  <div class="add-product-card">
    <h2><i class="fas fa-plus-circle"></i> Add Product</h2>
    <form id="addProductForm">
      <div class="form-grid">
        <div class="field-group"><label>Title *</label><input type="text" id="productName" required></div>
        <div class="field-group"><label>Category *</label><select id="productCategory" required><option value="oreille">Oreille</option><option value="nez">Nez</option><option value="nombril">Nombril</option><option value="micro-dermal">Micro dermal</option></select></div>
        <div class="field-group"><label>Subcategory</label><select id="productSubcategory"><option value="">None</option></select></div>
      </div>
      <div class="field-group"><label>Description</label><textarea id="productDesc" rows="2"></textarea></div>
      <div class="field-group"><label>Media (max 4 images)</label><div class="media-upload" id="mediaUploadTrigger"><i class="fas fa-cloud-upload-alt"></i> Choose a file or drag & drop<br><small>JPG, PNG, GIF, WEBP up to 5MB</small><input type="file" id="productImages" multiple accept="image/jpeg,image/png,image/gif,image/webp,image/avif" style="display:none"></div><div id="addImagePreviews" class="image-previews"></div></div>
      <div class="price-row" style="display:flex; gap:1rem;"><div class="field-group" style="flex:1"><label>Price (MAD) *</label><input type="number" step="0.01" id="productPrice" required></div><div class="field-group" style="flex:1"><label>Sale Price (optional)</label><input type="number" step="0.01" id="productSalePrice"></div></div>
      <button type="submit" class="submit-btn">Add product</button>
    </form>
    <div id="addMessage"></div>
  </div>
</div>

<div id="editDrawer" class="edit-drawer"><button class="close-edit" id="closeEditDrawer">&times;</button><h3>Edit product</h3><input type="hidden" id="editId"><div class="field-group"><label>Title</label><input id="editName"></div><div class="field-group"><label>Description</label><textarea id="editDescription" rows="2"></textarea></div><div class="field-group"><label>Price (MAD)</label><input type="number" step="0.01" id="editPrice"></div><div class="field-group"><label>Category</label><select id="editCategory"><option value="oreille">Oreille</option><option value="nez">Nez</option><option value="nombril">Nombril</option><option value="micro-dermal">Micro dermal</option></select></div><div class="field-group"><label>Subcategory</label><select id="editSubCategory"><option value="">None</option></select></div><div class="field-group"><label>Images</label><div id="editImagePreview" class="image-previews"></div><input type="file" id="editNewImages" multiple accept="image/*"></div><button id="saveEditBtn">Save changes</button></div>

<script>
  let adminToken = localStorage.getItem('adminToken') || '';
  let allProducts = [];
  let currentFilter = 'all';
  let searchTerm = '';
  let currentPage = 1;
  const itemsPerPage = 10;

  let selectedFiles = [];
  let editExistingImages = [];
  let editNewFiles = [];

  const subMap = { oreille: ['lobe','helix','flat helix','tragus','conch','daith','rook/snug','industrial','anti-tragus'], nez: ['nostril','septum','bridge','high nostril'], nombril: [], 'micro-dermal': [] };
  function updateSubCategorySelect(selectId, mainCat) {
    const select = document.getElementById(selectId);
    select.innerHTML = '<option value="">None</option>';
    (subMap[mainCat] || []).forEach(sub => { const opt = document.createElement('option'); opt.value = sub; opt.textContent = sub.charAt(0).toUpperCase()+sub.slice(1); select.appendChild(opt); });
  }

  // FIXED API CALL: For FormData, DO NOT set Content-Type header
  async function apiCall(url, options = {}) {
    const headers = { ...options.headers };
    // Only set Content-Type for JSON, not for FormData
    if (!(options.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
    }
    if (adminToken) headers['Authorization'] = `Bearer ${adminToken}`;
    const res = await fetch(url, { ...options, headers });
    if (res.status === 401 && !url.includes('/login')) { logout(); throw new Error('Session expired'); }
    return res;
  }

  async function loadProducts() {
    try {
      const res = await apiCall('/api/products');
      allProducts = await res.json();
      renderTable();
    } catch(e) { console.error(e); }
  }

  function renderTable() {
    let filtered = allProducts.filter(p => p.name?.toLowerCase().includes(searchTerm.toLowerCase()));
    if (currentFilter === 'published') filtered = filtered.filter(p => p.status !== 'hidden');
    else if (currentFilter === 'hidden') filtered = filtered.filter(p => p.status === 'hidden');
    filtered = filtered.map(p => ({ ...p, status: p.status || 'published' }));
    const totalPages = Math.ceil(filtered.length / itemsPerPage);
    const paginated = filtered.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage);
    const tbody = document.getElementById('productsTableBody');
    if (!paginated.length) tbody.innerHTML = '<tr><td colspan="5">No products</td></tr>';
    else {
      tbody.innerHTML = paginated.map(p => `
        <tr>
          <td style="display: flex; align-items: center; gap: 12px;"><img class="product-thumb" src="${p.images?.[0] || ''}" onerror="this.src='https://placehold.co/48x48'"><div>${escapeHtml(p.name)}</div></td>
          <td><span class="status-badge ${p.status === 'hidden' ? 'status-hidden' : ''}">${p.status === 'hidden' ? 'Hidden' : 'Published'}</span></td>
          <td>${(p.price/100).toFixed(2)} MAD</td>
          <td>In stock</td>
          <td class="action-icons"><button class="edit-btn" data-id="${p.id}"><i class="fas fa-edit"></i></button><button class="delete-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i></button></td>
        </tr>
      `).join('');
    }
    document.getElementById('pagination').innerHTML = `<span>Page ${currentPage} of ${totalPages||1}</span><div><button ${currentPage===1?'disabled':''} id="prevPage">Prev</button><button ${currentPage===totalPages||totalPages===0?'disabled':''} id="nextPage">Next</button></div>`;
    document.getElementById('prevPage')?.addEventListener('click', () => { if(currentPage>1){currentPage--; renderTable();} });
    document.getElementById('nextPage')?.addEventListener('click', () => { if(currentPage<totalPages){currentPage++; renderTable();} });
    attachTableEvents();
  }
  function attachTableEvents() {
    document.querySelectorAll('.edit-btn').forEach(btn => btn.addEventListener('click', () => openEditDrawer(btn.dataset.id)));
    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => deleteProduct(btn.dataset.id)));
  }
  async function deleteProduct(id) {
    if (!confirm('Delete permanently?')) return;
    try {
      const res = await apiCall(`/api/products/${id}`, { method: 'DELETE', body: JSON.stringify({}) });
      if (res.ok) { showMessage('addMessage', 'Deleted', 'success'); loadProducts(); }
      else showMessage('addMessage', 'Delete failed', 'error');
    } catch(e) { showMessage('addMessage', 'Error', 'error'); }
  }

  // EDIT DRAWER
  function openEditDrawer(id) {
    const product = allProducts.find(p => p.id === id);
    if (!product) return;
    editExistingImages = [...(product.images || [])];
    editNewFiles = [];
    document.getElementById('editId').value = product.id;
    document.getElementById('editName').value = product.name;
    document.getElementById('editDescription').value = product.description || '';
    document.getElementById('editPrice').value = (product.price/100).toFixed(2);
    document.getElementById('editCategory').value = product.mainCategory;
    updateSubCategorySelect('editSubCategory', product.mainCategory);
    setTimeout(() => document.getElementById('editSubCategory').value = product.subCategory || '', 20);
    renderEditImagePreviews();
    document.getElementById('editDrawer').classList.add('open');
  }
  function renderEditImagePreviews() {
    const container = document.getElementById('editImagePreview');
    container.innerHTML = '';
    editExistingImages.forEach((url, idx) => {
      const div = document.createElement('div'); div.className = 'preview-item';
      div.innerHTML = `<img src="${url}"><button class="remove-img" data-type="existing" data-idx="${idx}">✕</button>`;
      container.appendChild(div);
      div.querySelector('button').onclick = () => { editExistingImages.splice(idx,1); renderEditImagePreviews(); };
    });
    editNewFiles.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const div = document.createElement('div'); div.className = 'preview-item';
        div.innerHTML = `<img src="${e.target.result}"><button class="remove-img" data-type="new" data-idx="${idx}">✕</button>`;
        container.appendChild(div);
        div.querySelector('button').onclick = () => { editNewFiles.splice(idx,1); renderEditImagePreviews(); };
      };
      reader.readAsDataURL(file);
    });
  }
  document.getElementById('editNewImages').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (editExistingImages.length + editNewFiles.length + files.length > 4) { alert('Max 4 images'); e.target.value = ''; return; }
    editNewFiles.push(...files);
    renderEditImagePreviews();
    e.target.value = '';
  });
  document.getElementById('saveEditBtn').addEventListener('click', async () => {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('editName').value.trim();
    const description = document.getElementById('editDescription').value.trim();
    const price = parseFloat(document.getElementById('editPrice').value);
    const mainCategory = document.getElementById('editCategory').value;
    const subCategory = document.getElementById('editSubCategory').value;
    if (!name || isNaN(price)) { alert('Fill required fields'); return; }
    let newImageUrls = [];
    if (editNewFiles.length) {
      const formData = new FormData();
      editNewFiles.forEach(f => formData.append('productImages', f));
      const uploadRes = await apiCall('/api/upload-multiple', { method: 'POST', body: formData });
      if (!uploadRes.ok) { showMessage('addMessage', 'Image upload failed', 'error'); return; }
      const { imageUrls } = await uploadRes.json();
      newImageUrls = imageUrls;
    }
    const finalImages = [...editExistingImages, ...newImageUrls].slice(0,4);
    if (!finalImages.length) { alert('At least one image required'); return; }
    const productData = { name, description, price, mainCategory, subCategory, images: finalImages };
    const res = await apiCall(`/api/products/${id}`, { method: 'PUT', body: JSON.stringify(productData) });
    if (res.ok) { showMessage('addMessage', 'Updated', 'success'); loadProducts(); document.getElementById('editDrawer').classList.remove('open'); }
    else showMessage('addMessage', 'Update error', 'error');
  });
  document.getElementById('closeEditDrawer').onclick = () => document.getElementById('editDrawer').classList.remove('open');
  document.getElementById('editCategory').addEventListener('change', () => updateSubCategorySelect('editSubCategory', document.getElementById('editCategory').value));

  // ADD PRODUCT (with upload)
  document.getElementById('mediaUploadTrigger').addEventListener('click', () => document.getElementById('productImages').click());
  document.getElementById('productImages').addEventListener('change', (e) => {
    const files = Array.from(e.target.files);
    if (files.length > 4) { alert('Max 4 images'); e.target.value = ''; selectedFiles = []; document.getElementById('addImagePreviews').innerHTML = ''; return; }
    selectedFiles = files;
    const container = document.getElementById('addImagePreviews');
    container.innerHTML = '';
    files.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = (ev) => {
        const div = document.createElement('div'); div.className = 'preview-item';
        div.innerHTML = `<img src="${ev.target.result}"><button class="remove-img" data-idx="${idx}">✕</button>`;
        container.appendChild(div);
        div.querySelector('button').onclick = () => { selectedFiles.splice(idx,1); e.target.files = null; const dt = new DataTransfer(); selectedFiles.forEach(f=>dt.items.add(f)); e.target.files = dt.files; document.getElementById('productImages').dispatchEvent(new Event('change')); };
      }; reader.readAsDataURL(file);
    });
  });
  document.getElementById('addProductForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('productName').value.trim();
    const description = document.getElementById('productDesc').value.trim();
    const price = parseFloat(document.getElementById('productPrice').value);
    const mainCategory = document.getElementById('productCategory').value;
    const subCategory = document.getElementById('productSubcategory').value;
    if (!name || isNaN(price) || !mainCategory || selectedFiles.length===0) { showMessage('addMessage','Fill all fields and at least one image','error'); return; }
    // Upload images
    const formData = new FormData();
    selectedFiles.forEach(f => formData.append('productImages', f));
    const uploadRes = await apiCall('/api/upload-multiple', { method: 'POST', body: formData });
    if (!uploadRes.ok) { showMessage('addMessage','Image upload failed','error'); return; }
    const { imageUrls } = await uploadRes.json();
    const productData = { name, description, price, mainCategory, subCategory, images: imageUrls.slice(0,4) };
    const addRes = await apiCall('/api/products', { method: 'POST', body: JSON.stringify(productData) });
    if (addRes.ok) {
      showMessage('addMessage','Product added!','success');
      document.getElementById('addProductForm').reset();
      selectedFiles = [];
      document.getElementById('addImagePreviews').innerHTML = '';
      loadProducts();
    } else { showMessage('addMessage','Error adding product','error'); }
  });
  document.getElementById('productCategory').addEventListener('change', () => updateSubCategorySelect('productSubcategory', document.getElementById('productCategory').value));
  updateSubCategorySelect('productSubcategory', 'oreille');

  document.getElementById('searchInput').addEventListener('input', (e) => { searchTerm = e.target.value; currentPage=1; renderTable(); });
  document.querySelectorAll('.filter-buttons button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-buttons button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      currentPage = 1;
      renderTable();
    });
  });

  function showMessage(elId, text, type) {
    const div = document.getElementById(elId);
    div.innerHTML = `<div style="padding:0.5rem; border-radius:20px; margin-top:1rem; background:${type==='success'?'#E6F7EC':'#FFECEE'}">${text}</div>`;
    setTimeout(() => div.innerHTML = '', 3000);
  }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }

  async function attemptLogin() {
    const pwd = document.getElementById('loginPassword').value;
    try {
      const res = await fetch('/api/admin/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password:pwd }) });
      const data = await res.json();
      if (res.ok && data.token) {
        adminToken = data.token;
        localStorage.setItem('adminToken', adminToken);
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadProducts();
      } else document.getElementById('loginError').innerText = 'Invalid password';
    } catch(e) { document.getElementById('loginError').innerText = 'Server error'; }
  }
  function logout() { adminToken = ''; localStorage.removeItem('adminToken'); document.getElementById('loginContainer').style.display = 'block'; document.getElementById('adminPanel').style.display = 'none'; }
  document.getElementById('loginBtn').addEventListener('click', attemptLogin);
  document.getElementById('loginPassword').addEventListener('keypress', (e) => { if(e.key==='Enter') attemptLogin(); });
  document.getElementById('logoutBtn').addEventListener('click', logout);
  if (localStorage.getItem('adminToken')) { adminToken = localStorage.getItem('adminToken'); document.getElementById('loginContainer').style.display = 'none'; document.getElementById('adminPanel').style.display = 'block'; loadProducts(); }
</script>
</body>
</html>
