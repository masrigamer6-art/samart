<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="description" content="Samar Piercing - luxury body jewelry in Marrakech. Shop earrings, nose rings, belly rings and micro dermals. Click & Collect available.">
  <meta name="keywords" content="piercing, marrakech, ear piercing, nose piercing, jewelry, helix, tragus, conch, daith, luxury">
  <meta name="author" content="Samar Piercing">
  <title>Samar Piercing | Luxury Body Jewelry</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #FFFFFF; color: #1E1B18; line-height: 1.4; }

    /* Main header row (all in one line) */
    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 0.8rem 2rem;
      border-bottom: 1px solid #EDE6DD;
      background: white;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }
    .hamburger {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: #2C2C2C;
      display: flex;
      align-items: center;
    }
    .appointment-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #2C2C2C;
      display: flex;
      align-items: center;
    }
    .location-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #2C2C2C;
      display: flex;
      align-items: center;
    }
    /* Stacked logo: SAMAR above PIERCING */
    .logo-stacked {
      text-align: center;
      line-height: 1.2;
      font-family: 'Cormorant Garamond', serif;
    }
    .logo-samar {
      font-size: 1.6rem;
      font-weight: 600;
      color: #2C2C2C;
      display: block;
      letter-spacing: 2px;
    }
    .logo-piercing {
      font-size: 0.9rem;
      font-weight: 500;
      color: #A88262;
      letter-spacing: 3px;
      display: block;
      margin-top: 2px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #F5F5F5;
      border: 1px solid #E2E8F0;
      border-radius: 40px;
      padding: 0.3rem 1rem;
      width: 220px;
    }
    .search-bar i {
      color: #94A3B8;
      margin-right: 8px;
    }
    .search-bar input {
      border: none;
      background: transparent;
      width: 100%;
      outline: none;
      font-size: 0.8rem;
    }
    .cart-icon {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #2C2C2C;
      position: relative;
      text-decoration: none;
    }
    .cart-count {
      position: absolute;
      top: -8px;
      right: -12px;
      background: #C4A882;
      color: #1E1B18;
      border-radius: 30px;
      padding: 0.1rem 0.4rem;
      font-size: 0.6rem;
      font-weight: bold;
    }
    .lang-toggle {
      background: none;
      border: 1px solid #E8D8C8;
      border-radius: 40px;
      padding: 0.3rem 0.7rem;
      font-size: 0.7rem;
      cursor: pointer;
    }

    /* Hero image */
    .hero-image { width: 100%; height: auto; max-height: 500px; overflow: hidden; background: #FAFAFA; }
    .hero-image img { width: 100%; height: auto; object-fit: cover; display: block; }

    /* Shop by section (circle slider) */
    .shop-by-section { max-width: 1280px; margin: 2rem auto 0; padding: 0 1rem; text-align: center; }
    .shop-by-title { font-size: 1.2rem; font-weight: 500; color: #2C2C2C; margin-bottom: 1.5rem; }
    .circle-slider { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 1.5rem; justify-content: center; padding-bottom: 0.5rem; scrollbar-width: thin; }
    .circle-item { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; cursor: pointer; transition: transform 0.2s; }
    .circle-item:hover { transform: translateY(-5px); }
    .circle-img { width: 85px; height: 85px; background: #FEFAF5; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #E8D8C8; overflow: hidden; }
    .circle-img img { width: 100%; height: 100%; object-fit: cover; }
    .circle-item.active .circle-img { border-color: #C4A882; box-shadow: 0 0 0 3px rgba(196,168,130,0.3); transform: scale(1.02); }
    .circle-label { font-size: 0.75rem; font-weight: 500; color: #2C2C2C; }

    /* New Collection section */
    .new-collection { max-width: 1280px; margin: 3rem auto 2rem; padding: 0 1rem; text-align: center; }
    .new-collection h2 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; font-weight: 600; letter-spacing: 2px; color: #2C2C2C; margin-bottom: 0.5rem; }
    .new-collection .collection-desc { font-size: 0.9rem; color: #8B7A6C; margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; }
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem; }
    .product-card { background: white; border-radius: 20px; overflow: hidden; transition: transform 0.2s; cursor: pointer; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.05); }
    .product-img { width: 100%; aspect-ratio: 1 / 1; background: #FEFAF5; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 20px; }
    .product-img img { width: 100%; height: 100%; object-fit: cover; }
    .product-info { padding: 0.8rem 0.5rem; text-align: center; }
    .product-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .product-price { font-weight: 700; color: #C4A882; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .add-to-cart { background: #2C2C2C; border: none; padding: 0.3rem 0.8rem; border-radius: 40px; color: white; font-size: 0.7rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: 0.2s; }
    .add-to-cart i { color: #C4A882; }
    .add-to-cart:hover { background: #C4A882; color: #2C2C2C; }
    .add-to-cart:hover i { color: #2C2C2C; }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { max-width: 500px; width: 90%; background: white; border-radius: 28px; overflow: hidden; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #F0E2D8; }
    .close-modal { background: #F0E2D8; border: none; font-size: 1.5rem; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; }
    .modal-body { padding: 1rem; text-align: center; }
    .modal-body img { max-width: 100%; border-radius: 16px; margin-bottom: 1rem; }
    .modal-add { background: #C4A882; border: none; padding: 0.6rem; border-radius: 40px; font-weight: 600; width: 100%; margin-top: 1rem; cursor: pointer; }

    /* Drawer, footer, social */
    .info-container-bottom { background: #FFFFFF; border-top: 1px solid #F0E2D8; padding: 1.5rem 1rem; margin: 2rem 0 0; }
    .info-flex { max-width: 1280px; margin: 0 auto; display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
    .social-links { display: flex; gap: 1.2rem; }
    .social-icon { display: flex; align-items: center; justify-content: center; width: 48px; height: 48px; background: #FEFAF5; border-radius: 50%; border: 1px solid #E8D8C8; color: #C4A882; font-size: 1.4rem; transition: all 0.2s; text-decoration: none; }
    .social-icon:hover { background: #C4A882; color: white; transform: translateY(-3px); }
    footer { text-align: center; padding: 1.5rem; font-size: 0.75rem; color: #8C7568; }

    .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; visibility: hidden; opacity: 0; transition: 0.2s; }
    .drawer-overlay.open { visibility: visible; opacity: 1; }
    .drawer { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; box-shadow: 4px 0 20px rgba(0,0,0,0.08); z-index: 201; transition: left 0.3s ease; display: flex; flex-direction: column; border-right: 1px solid #EAD5C8; }
    .drawer.open { left: 0; }
    .drawer-header { padding: 1.5rem 1rem; border-bottom: 1px solid #F0E2D8; display: flex; justify-content: space-between; }
    .categories-list { flex: 1; overflow-y: auto; }
    .main-cat-item { border-bottom: 1px solid #F0E2D8; }
    .main-cat-title { padding: 0.8rem 1rem; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; }
    .subcats { padding-left: 1.5rem; display: none; background: #FEFAF5; }
    .subcats.show { display: block; }
    .subcat-item, .all-link { padding: 0.6rem 1rem; cursor: pointer; font-size: 0.85rem; }

    @media (max-width: 800px) {
      .main-header { flex-direction: column; align-items: stretch; }
      .header-left, .header-right { justify-content: center; }
      .logo-stacked { order: -1; margin-bottom: 0.5rem; }
      .search-bar { width: 100%; }
    }
    @media (max-width: 600px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .new-collection h2 { font-size: 2rem; }
      .circle-img { width: 65px; height: 65px; }
    }
  </style>
</head>
<body>

<!-- Header: all in one row with stacked logo -->
<div class="main-header">
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
    <button class="appointment-icon" id="appointmentBtn"><i class="fas fa-phone-alt"></i></button>
    <button class="location-icon" id="locationBtn"><i class="fas fa-map-marker-alt"></i></button>
  </div>
  <div class="logo-stacked">
    <span class="logo-samar">SAMAR</span>
    <span class="logo-piercing">PIERCING</span>
  </div>
  <div class="header-right">
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search...">
    </div>
    <button id="langToggle" class="lang-toggle">🇫🇷 FR</button>
    <a href="/cart" class="cart-icon"><i class="fas fa-shopping-bag"></i> <span id="cartNavBadge" class="cart-count">0</span></a>
  </div>
</div>

<!-- Hero Image -->
<div class="hero-image"><img src="Neutral Minimalist Business Proposal Docs Banner.png" alt="Samar piercing collection"></div>

<!-- Shop By Piercing (circle slider) -->
<div class="shop-by-section">
  <div class="shop-by-title" id="shopByTitle">Shop By Piercing</div>
  <div class="circle-slider" id="circleSlider"></div>
</div>

<!-- New Collection Section -->
<div class="new-collection">
  <h2>NEWIN</h2>
  <div class="collection-desc">New Collection. Shine bright in our new collection of fine jewelry!</div>
  <div id="productsContainer" class="products-grid">
    <div style="grid-column:1/-1; text-align:center;">Loading stunning pieces...</div>
  </div>
</div>

<!-- Social & Footer -->
<div class="info-container-bottom">
  <div class="info-flex">
    <div class="social-links">
      <a href="https://wa.me/212781570083" target="_blank" class="social-icon"><i class="fab fa-whatsapp"></i></a>
      <a href="https://www.instagram.com/piercing_bysamar" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
      <a href="https://www.tiktok.com/@piercingbysmar" target="_blank" class="social-icon"><i class="fab fa-tiktok"></i></a>
      <a href="https://www.snapchat.com/add/piercingbysamar" target="_blank" class="social-icon"><i class="fab fa-snapchat-ghost"></i></a>
    </div>
  </div>
</div>
<footer id="footer">© 2026 Samar Piercing — Order via WhatsApp</footer>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header"><h3 id="drawerTitle">Categories</h3><button class="close-drawer" id="closeDrawerBtn">&times;</button></div>
  <div class="categories-list" id="categoriesList"></div>
</div>

<!-- Product Modal -->
<div id="productModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3>Product Details</h3><button class="close-modal">&times;</button></div>
    <div class="modal-body">
      <img id="modalImage" src="" alt="">
      <h3 id="modalTitle"></h3>
      <p id="modalDesc"></p>
      <div id="modalPrice" style="font-weight:700; margin:0.5rem 0;"></div>
      <button id="modalAddCart" class="modal-add">Add to Cart</button>
    </div>
  </div>
</div>

<script>
  // Translations
  const translations = {
    en: { shopByTitle: "Shop By Piercing", addToCart: "Add to cart", footer: "© 2026 Samar Piercing — Order via WhatsApp", drawerTitle: "Categories", allProducts: "✨ All Products" },
    fr: { shopByTitle: "Acheter par piercing", addToCart: "Ajouter au panier", footer: "© 2026 Samar Piercing — Commande via WhatsApp", drawerTitle: "Catégories", allProducts: "✨ Tous les produits" }
  };
  let currentLang = localStorage.getItem('lang') || 'en';
  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('lang', lang);
    document.getElementById('shopByTitle').innerText = translations[lang].shopByTitle;
    document.getElementById('footer').innerText = translations[lang].footer;
    document.getElementById('drawerTitle').innerHTML = translations[lang].drawerTitle;
    const toggleBtn = document.getElementById('langToggle');
    toggleBtn.innerText = lang === 'en' ? '🇫🇷 FR' : '🇬🇧 EN';
    renderDrawer();
    if (allProducts.length) renderProducts(allProducts);
    else fetchProducts();
  }

  // Categories & circles
  const categoriesDef = [
    { main: "oreille", labelEn: "Ear (Oreille)", labelFr: "Oreille", sub: ["lobe","helix","flat helix","tragus","conch","daith","rook/snug","industrial","anti-tragus"] },
    { main: "nez", labelEn: "Nose", labelFr: "Nez", sub: ["nostril","septum","bridge","high nostril"] },
    { main: "nombril", labelEn: "Belly", labelFr: "Nombril", sub: [] },
    { main: "micro-dermal", labelEn: "Micro dermal", labelFr: "Micro dermal", sub: [] }
  ];
  const circleItems = [
    { name: "Helix", mainCat: "oreille", subCat: "helix", imgUrl: "/images/helix.avif" },
    { name: "Tragus", mainCat: "oreille", subCat: "tragus", imgUrl: "/images/tragus.avif" },
    { name: "Conch", mainCat: "oreille", subCat: "conch", imgUrl: "/images/conch.avif" },
    { name: "Daith", mainCat: "oreille", subCat: "daith", imgUrl: "/images/daith.avif" },
    { name: "Rook", mainCat: "oreille", subCat: "rook/snug", imgUrl: "/images/rock.avif" },
    { name: "Industrial", mainCat: "oreille", subCat: "industrial", imgUrl: "/images/indu.avif" },
    { name: "Lobe", mainCat: "oreille", subCat: "lobe", imgUrl: "/images/lobe.avif" }
  ];

  let allProducts = [];
  let currentMain = "all", currentSub = "";

  function renderCircleSlider() {
    const container = document.getElementById('circleSlider');
    if (!container) return;
    let html = '';
    circleItems.forEach(item => {
      html += `<div class="circle-item" data-main="${item.mainCat}" data-sub="${item.subCat}">
        <div class="circle-img"><img src="${item.imgUrl}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/85'"></div>
        <div class="circle-label">${item.name}</div>
      </div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.circle-item').forEach(el => {
      el.addEventListener('click', () => {
        currentMain = el.dataset.main;
        currentSub = el.dataset.sub;
        document.querySelectorAll('.circle-item').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        applyFilter();
      });
    });
  }

  function renderDrawer() {
    const container = document.getElementById("categoriesList");
    if (!container) return;
    let html = `<div class="all-link" data-main="all" data-sub="">${translations[currentLang].allProducts}</div>`;
    categoriesDef.forEach(cat => {
      const catLabel = currentLang === 'en' ? cat.labelEn : cat.labelFr;
      const hasSub = cat.sub.length > 0;
      html += `<div class="main-cat-item" data-main="${cat.main}">
        <div class="main-cat-title">${catLabel}${hasSub ? '<i class="fas fa-chevron-down"></i>' : ''}</div>
        ${hasSub ? `<div class="subcats" data-parent="${cat.main}">${cat.sub.map(sub => `<div class="subcat-item" data-main="${cat.main}" data-sub="${sub}">${sub.charAt(0).toUpperCase()+sub.slice(1)}</div>`).join('')}</div>` : ''}
      </div>`;
    });
    container.innerHTML = html;
    document.querySelectorAll('.all-link').forEach(el => {
      el.addEventListener('click', () => { currentMain="all"; currentSub=""; closeDrawer(); applyFilter(); });
    });
    document.querySelectorAll('.main-cat-title').forEach(title => {
      title.addEventListener('click', (e) => {
        e.stopPropagation();
        const parentDiv = title.closest('.main-cat-item');
        const subDiv = parentDiv.querySelector('.subcats');
        if (subDiv) subDiv.classList.toggle('show');
        else { currentMain = parentDiv.dataset.main; currentSub = ""; closeDrawer(); applyFilter(); }
      });
    });
    document.querySelectorAll('.subcat-item').forEach(sub => {
      sub.addEventListener('click', () => { currentMain = sub.dataset.main; currentSub = sub.dataset.sub; closeDrawer(); applyFilter(); });
    });
  }

  function applyFilter() {
    let filtered = allProducts;
    if (currentMain !== "all") {
      filtered = filtered.filter(p => p.mainCategory === currentMain);
      if (currentSub) filtered = filtered.filter(p => p.subCategory === currentSub);
    }
    renderProducts(filtered);
  }

  function renderProducts(productsArray) {
    const container = document.getElementById('productsContainer');
    if (!productsArray.length) {
      container.innerHTML = '<div style="grid-column:1/-1; text-align:center;">✨ No products found ✨</div>';
      return;
    }
    container.innerHTML = productsArray.map(p => `
      <div class="product-card" data-id="${p.id}">
        <div class="product-img"><img src="${p.images?.[0] || ''}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'"></div>
        <div class="product-info">
          <div class="product-title">${escapeHtml(p.name)}</div>
          <div class="product-price">${(p.price/100).toFixed(2)} MAD</div>
          <button class="add-to-cart" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}">
            <i class="fas fa-plus-circle"></i> ${translations[currentLang].addToCart}
          </button>
        </div>
      </div>
    `).join('');
    attachCartEvents();
  }

  function attachCartEvents() {
    document.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        const price = parseInt(btn.dataset.price);
        addToCart({ id, name, price, quantity: 1 });
      });
    });
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-to-cart')) return;
        const product = allProducts.find(p => p.id === card.dataset.id);
        if (product) openProductModal(product);
      });
    });
  }

  function addToCart(product) {
    let cart = JSON.parse(localStorage.getItem('piercingCart')) || [];
    const idx = cart.findIndex(i => i.id === product.id);
    if (idx !== -1) cart[idx].quantity += product.quantity;
    else cart.push({ ...product, image: product.image || (allProducts.find(p=>p.id===product.id)?.images?.[0]) });
    localStorage.setItem('piercingCart', JSON.stringify(cart));
    updateCartBadge();
    showToast(`✨ ${product.name} ${currentLang === 'en' ? 'added to cart' : 'ajouté au panier'}`);
  }

  function updateCartBadge() {
    const cart = JSON.parse(localStorage.getItem('piercingCart')) || [];
    const total = cart.reduce((s,i) => s + i.quantity, 0);
    document.querySelectorAll('#cartNavBadge').forEach(b => b.innerText = total);
  }

  function showToast(msg) {
    const toast = document.createElement('div');
    toast.innerText = msg;
    toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2C2C2C; color:#fff; padding:8px 18px; border-radius:60px; z-index:2000; font-size:0.8rem;';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
  }

  async function fetchProducts() {
    try {
      const res = await fetch('/api/products');
      allProducts = await res.json();
      renderProducts(allProducts);
    } catch (err) {
      document.getElementById('productsContainer').innerHTML = '<div style="grid-column:1/-1; text-align:center;">⚠️ Unable to load products</div>';
    }
  }

  // Modal logic
  let currentModalProduct = null;
  function openProductModal(product) {
    currentModalProduct = product;
    document.getElementById('modalImage').src = product.images?.[0] || '';
    document.getElementById('modalTitle').innerText = product.name;
    document.getElementById('modalDesc').innerText = product.description || '';
    document.getElementById('modalPrice').innerHTML = `${(product.price/100).toFixed(2)} MAD`;
    document.getElementById('productModal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('productModal').style.display = 'none'; }
  document.querySelector('.close-modal').addEventListener('click', closeModal);
  window.addEventListener('click', (e) => { if (e.target === document.getElementById('productModal')) closeModal(); });
  document.getElementById('modalAddCart').onclick = () => {
    if (currentModalProduct) addToCart({ id: currentModalProduct.id, name: currentModalProduct.name, price: currentModalProduct.price, quantity: 1 });
    closeModal();
  };

  // Drawer, location, appointment
  function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
  document.getElementById('hamburgerBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
  document.getElementById('langToggle').addEventListener('click', () => { setLanguage(currentLang === 'en' ? 'fr' : 'en'); });
  document.getElementById('appointmentBtn').addEventListener('click', () => {
    window.open('https://wa.me/212781570083?text=Hello%2C%20I%20would%20like%20to%20book%20a%20piercing%20appointment.', '_blank');
  });
  document.getElementById('locationBtn').addEventListener('click', () => {
    window.open('https://maps.google.com/?q=Marrakech+Mhamid+3+derrière+la+clinique+de+l’aéroport', '_blank');
  });

  // Search functionality
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
    renderProducts(filtered);
  });

  renderCircleSlider();
  renderDrawer();
  fetchProducts();
  updateCartBadge();
  setLanguage(currentLang);
</script>
</body>
</html>
