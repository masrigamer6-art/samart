  }
  function applyGlobalFilter() { const isAll = (currentMain === "all" && currentSub === ""); const fullLayoutDiv = document.getElementById('fullLayout'); const filteredDiv = document.getElementById('filteredProductsGrid'); if(isAll) { fullLayoutDiv.style.display = 'block'; filteredDiv.style.display = 'none'; renderAllSections(allProducts); } else { fullLayoutDiv.style.display = 'none'; filteredDiv.style.display = 'block'; let filtered = allProducts.filter(p => p.mainCategory === currentMain); if(currentSub) filtered = filtered.filter(p => p.subCategory === currentSub); filteredDiv.innerHTML = `<div class="products-grid">${renderProductsHTML(filtered)}</div>`; attachCartEvents(); attachQuantityEvents(); } }
  function renderAllSections(productsArray) { const sorted = [...productsArray].sort((a,b)=> (Number(b.id)||0)-(Number(a.id)||0)); const newArrivals = sorted.slice(0,4); document.getElementById('newArrivalsGrid').innerHTML = newArrivals.length ? renderProductsHTML(newArrivals) : `<div style="grid-column:1/-1; text-align:center;">${translations[currentLang].noNewArrivals}</div>`; const categoryOrder = [ { key:"oreille", label: currentLang==='en'?"Ear ":"Oreille" }, { key:"nez", label: currentLang==='en'?"Nose":"Nez" }, { key:"nombril", label: currentLang==='en'?"Belly":"Nombril" }, { key:"micro-dermal", label: currentLang==='en'?"Micro dermal":"Micro dermal" } ]; let sectionsHtml=""; for(const cat of categoryOrder){ const catProducts = productsArray.filter(p=>p.mainCategory===cat.key); if(catProducts.length) sectionsHtml += `<div class="section-title">${cat.label}</div><div class="products-grid">${renderProductsHTML(catProducts)}</div>`; } document.getElementById('categorySections').innerHTML = sectionsHtml || `<div style="text-align:center; padding:2rem;">${translations[currentLang].noProducts}</div>`; attachCartEvents(); attachQuantityEvents(); }
  function renderProductsHTML(productsArray) { if(!productsArray.length) return `<div style="grid-column:1/-1; text-align:center;">${translations[currentLang].noFiltered}</div>`; return productsArray.map(p => { const catDisplay = p.subCategory || p.mainCategory; return `<div class="product-card" data-product-id="${p.id}"><div class="product-img"><img src="${p.images && p.images[0] || ''}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x220?text=No+Image'"></div><div class="product-info"><div class="product-title">${escapeHtml(p.name)}<span class="subcat-tag">${escapeHtml(catDisplay)}</span></div><div class="product-desc">${escapeHtml(p.description || '')}</div><div class="price-row"><span class="price">${(p.price/100).toFixed(2)} MAD</span><div class="qty-ctrl" data-pid="${p.id}"><button class="qty-minus" data-id="${p.id}">-</button><span class="qty-num" data-id="${p.id}">1</span><button class="qty-plus" data-id="${p.id}">+</button></div><button class="add-to-cart-with-qty" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}"><i class="fas fa-plus-circle"></i> ${translations[currentLang].addToCart}</button></div></div></div>`; }).join(''); }
  function attachQuantityEvents() { document.querySelectorAll('.qty-minus').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const span = document.querySelector(`.qty-num[data-id="${id}"]`); if(span) { let val = parseInt(span.innerText) || 1; if(val>1) span.innerText = val-1; } }; }); document.querySelectorAll('.qty-plus').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const span = document.querySelector(`.qty-num[data-id="${id}"]`); if(span) { let val = parseInt(span.innerText) || 1; span.innerText = val+1; } }; }); document.querySelectorAll('.add-to-cart-with-qty').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const name = btn.dataset.name; const price = parseInt(btn.dataset.price); const qtySpan = document.querySelector(`.qty-num[data-id="${id}"]`); let quantity = qtySpan ? parseInt(qtySpan.innerText) : 1; addToCart({ id, name, price, quantity }); const resetSpan = document.querySelector(`.qty-num[data-id="${id}"]`); if(resetSpan) resetSpan.innerText = "1"; }; }); }
  function attachCartEvents() { attachQuantityEvents(); document.querySelectorAll('.product-card').forEach(card => { card.addEventListener('click', (e) => { if(e.target.closest('.add-to-cart-with-qty') || e.target.closest('.qty-ctrl')) return; const pid = card.dataset.productId; const product = allProducts.find(p => p.id === pid); if(product) openProductModal(product); }); }); }
  function addToCart(product) { let cart = JSON.parse(localStorage.getItem('piercingCart')) || []; const idx = cart.findIndex(i => i.id === product.id); if(idx !== -1) cart[idx].quantity += product.quantity; else cart.push({ id: product.id, name: product.name, price: product.price, quantity: product.quantity, image: product.image || (allProducts.find(p=>p.id===product.id)?.images?.[0]) }); localStorage.setItem('piercingCart', JSON.stringify(cart)); updateCartBadge(); showToast(`✨ ${product.name} ${translations[currentLang].addedToCart}`); }
  function updateCartBadge() { const cart = JSON.parse(localStorage.getItem('piercingCart')) || []; const total = cart.reduce((s,i)=>s+i.quantity,0); document.querySelectorAll('#cartNavBadge').forEach(b=>b.innerText=total); }
  function showToast(msg) { const toast = document.createElement('div'); toast.innerText = msg; toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2C2C2C; color:#fff; padding:8px 18px; border-radius:60px; z-index:2000; font-size:0.8rem;'; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2500); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
  async function fetchProducts() { try { const res = await fetch('/api/products'); if(!res.ok) throw new Error(); allProducts = await res.json(); renderAllSections(allProducts); applyGlobalFilter(); } catch(err) { document.getElementById('newArrivalsGrid').innerHTML = `<div class="error">${translations[currentLang].loadingError}</div>`; } }
  // modal logic with quantity
  let currentModalProduct = null, modalQty=1;
  function openProductModal(product) { currentModalProduct = product; modalQty=1; document.getElementById('modalQtyVal').innerText = "1"; document.getElementById('modalTitle').innerText = product.name; document.getElementById('modalDesc').innerText = product.description || ''; document.getElementById('modalPrice').innerHTML = `${(product.price/100).toFixed(2)} MAD`; const images = product.images && product.images.length ? product.images : []; if(images.length){ document.getElementById('modalMainImage').src = images[0]; let thumbsHtml=''; images.forEach((img,idx)=>{ thumbsHtml += `<div class="thumb ${idx===0?'active':''}" data-img="${img}"><img src="${img}" alt=""></div>`; }); document.getElementById('modalThumbnails').innerHTML = thumbsHtml; document.querySelectorAll('.thumb').forEach(t=>{ t.onclick=()=>{ document.querySelectorAll('.thumb').forEach(t2=>t2.classList.remove('active')); t.classList.add('active'); document.getElementById('modalMainImage').src = t.dataset.img; }; }); } else { document.getElementById('modalMainImage').src = 'https://via.placeholder.com/600x400'; document.getElementById('modalThumbnails').innerHTML=''; } document.getElementById('productModal').style.display='flex'; }
  function closeModal() { document.getElementById('productModal').style.display='none'; }
  document.querySelector('.close-modal').addEventListener('click', closeModal); window.addEventListener('click',(e)=>{ if(e.target===document.getElementById('productModal')) closeModal(); });
  document.getElementById('modalQtyMinus').onclick = () => { if(modalQty>1) modalQty--; document.getElementById('modalQtyVal').innerText = modalQty; };
  document.getElementById('modalQtyPlus').onclick = () => { modalQty++; document.getElementById('modalQtyVal').innerText = modalQty; };
  document.getElementById('modalAddToCart').onclick = () => { if(currentModalProduct) addToCart({ id: currentModalProduct.id, name: currentModalProduct.name, price: currentModalProduct.price, quantity: modalQty, image: currentModalProduct.images?.[0] }); closeModal(); };
  // drawer & appointment
  function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
  document.getElementById('hamburgerBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
  document.getElementById('langToggle').addEventListener('click', () => { const newLang = currentLang === 'en' ? 'fr' : 'en'; setLanguage(newLang); });
  // Appointment button (phone icon)
  document.getElementById('bookAppointmentBtn').addEventListener('click', () => { window.open('https://wa.me/212781570083?text=Hello%2C%20I%20would%20like%20to%20book%20a%20piercing%20appointment.%20Can%20you%20let%20me%20know%20the%20available%20slots%3F', '_blank'); });
  // Location button
  document.getElementById('locationBtn').addEventListener('click', () => { window.open('https://maps.google.com/?q=Marrakech+Mhamid+3+derrière+la+clinique+de+l’aéroport', '_blank'); });
  // Search functionality
  document.getElementById('searchInput').addEventListener('input', (e) => {
    const term = e.target.value.toLowerCase();
    // Simple client-side search on all products (you can extend if needed)
    if (term === '') {
      applyGlobalFilter();
    } else {
      const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term));
      renderAllSections(filtered);
    }
  });
  renderCircleSlider(); renderDrawer(); fetchProducts(); updateCartBadge(); setLanguage(currentLang);
</script>
</body>
