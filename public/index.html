  let allProducts = [], currentMain = "all", currentSub = "";

  function renderCircleSlider() { const container = document.getElementById('circleSlider'); if(!container) return; let html = ''; circleItems.forEach(item => { html += `<div class="circle-item" data-main="${item.mainCat}" data-sub="${item.subCat}"><div class="circle-img"><img src="${item.imgUrl}" alt="${item.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/100'"></div><div class="circle-label">${item.name}</div></div>`; }); container.innerHTML = html; document.querySelectorAll('.circle-item').forEach(el => { el.addEventListener('click', () => { currentMain = el.dataset.main; currentSub = el.dataset.sub; document.querySelectorAll('.circle-item').forEach(c=>c.classList.remove('active')); el.classList.add('active'); applyFilter(); }); }); }

  function renderDrawer() { const container = document.getElementById("categoriesList"); if(!container) return; let html = `<div class="all-link" data-main="all" data-sub="">${translations[currentLang].allProducts}</div>`; categoriesDef.forEach(cat => { const catLabel = currentLang === 'en' ? cat.labelEn : cat.labelFr; const hasSub = cat.sub.length > 0; html += `<div class="main-cat-item" data-main="${cat.main}"><div class="main-cat-title">${catLabel}${hasSub ? '<i class="fas fa-chevron-down"></i>' : ''}</div>${hasSub ? `<div class="subcats" data-parent="${cat.main}">${cat.sub.map(sub => `<div class="subcat-item" data-main="${cat.main}" data-sub="${sub}">${sub.charAt(0).toUpperCase()+sub.slice(1)}</div>`).join('')}</div>` : ''}</div>`; }); container.innerHTML = html;
    document.querySelectorAll('.all-link').forEach(el => { el.addEventListener('click', () => { currentMain="all"; currentSub=""; closeDrawer(); applyFilter(); }); });
    document.querySelectorAll('.main-cat-title').forEach(title => { title.addEventListener('click', (e) => { e.stopPropagation(); const parentDiv = title.closest('.main-cat-item'); const subDiv = parentDiv.querySelector('.subcats'); if(subDiv) subDiv.classList.toggle('show'); else { currentMain = parentDiv.dataset.main; currentSub = ""; closeDrawer(); applyFilter(); } }); });
    document.querySelectorAll('.subcat-item').forEach(sub => { sub.addEventListener('click', () => { currentMain = sub.dataset.main; currentSub = sub.dataset.sub; closeDrawer(); applyFilter(); }); });
  }

  function applyFilter() { 
    const isAll = (currentMain === "all" && currentSub === ""); 
    const fullLayoutDiv = document.getElementById('fullLayout'); 
    const filteredDiv = document.getElementById('filteredProductsGrid'); 
    if(isAll) { 
      fullLayoutDiv.style.display = 'block'; 
      filteredDiv.style.display = 'none'; 
      renderFullLayout(allProducts); 
    } else { 
      fullLayoutDiv.style.display = 'none'; 
      filteredDiv.style.display = 'block'; 
      let filtered = allProducts.filter(p => p.mainCategory === currentMain); 
      if(currentSub) filtered = filtered.filter(p => p.subCategory === currentSub); 
      filteredDiv.innerHTML = `<div class="products-grid">${renderProductsHTML(filtered)}</div>`; 
      attachCartEvents(); attachQuantityEvents(); 
    } 
  }

  // Render New Arrivals (4 newest) + category sections (each up to 4 products)
  function renderFullLayout(productsArray) {
    const container = document.getElementById('fullLayout');
    if (!productsArray.length) {
      container.innerHTML = `<div style="text-align:center; padding:2rem;">No products available</div>`;
      return;
    }

    // 1. New Arrivals: 4 newest products (by id descending)
    const sorted = [...productsArray].sort((a,b)=> (Number(b.id)||0) - (Number(a.id)||0));
    const newest = sorted.slice(0,4);
    let html = `
      <div class="premiere-title">✨ New Arrivals ✨</div>
      <div class="section-sub">Discover our latest pieces</div>
      <div class="products-grid">${renderProductsHTML(newest)}</div>
    `;

    // 2. Category sections: oreille, nez, nombril, micro-dermal
    const categoryOrder = [
      { key: "oreille", label: currentLang === 'en' ? "Ear" : "Oreille" },
      { key: "nez", label: currentLang === 'en' ? "Nose" : "Nez" },
      { key: "nombril", label: currentLang === 'en' ? "Belly" : "Nombril" },
      { key: "micro-dermal", label: currentLang === 'en' ? "Micro dermal" : "Micro dermal" }
    ];
    for (const cat of categoryOrder) {
      const catProducts = productsArray.filter(p => p.mainCategory === cat.key).slice(0,4);
      if (catProducts.length) {
        html += `<div class="cat-title">${cat.label}</div><div class="products-grid">${renderProductsHTML(catProducts)}</div>`;
      }
    }
    container.innerHTML = html;
    attachCartEvents(); attachQuantityEvents();
  }

  function renderProductsHTML(productsArray) {
    if(!productsArray.length) return `<div style="grid-column:1/-1; text-align:center;">No products found</div>`;
    const buttonText = translations[currentLang].addToCart;
    return productsArray.map(p => {
      const catDisplay = p.subCategory || p.mainCategory;
      return `
        <div class="wsk-cp-product" data-product-id="${p.id}">
          <div class="wsk-cp-img"><img src="${p.images?.[0] || ''}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/300'"></div>
          <div class="wsk-cp-text">
            <div class="category"><span>${escapeHtml(catDisplay)}</span></div>
            <div class="title-product"><h3>${escapeHtml(p.name)}</h3></div>
            <div class="description-prod"><p>${escapeHtml(p.description || '')}</p></div>
            <div class="card-footer">
              <div class="price">${(p.price/100).toFixed(2)} MAD</div>
              <div class="qty-ctrl" data-pid="${p.id}">
                <button class="qty-minus" data-id="${p.id}">-</button>
                <span class="qty-num" data-id="${p.id}">1</span>
                <button class="qty-plus" data-id="${p.id}">+</button>
              </div>
              <button class="button add-to-cart-with-qty" data-id="${p.id}" data-name="${escapeHtml(p.name)}" data-price="${p.price}" data-tooltip="${buttonText}">
                <div class="button-wrapper"><div class="text">${buttonText}</div><div class="icon"><i class="fas fa-shopping-cart"></i></div></div>
              </button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function attachQuantityEvents() { 
    document.querySelectorAll('.qty-minus').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const span = document.querySelector(`.qty-num[data-id="${id}"]`); if(span) { let val = parseInt(span.innerText) || 1; if(val>1) span.innerText = val-1; } }; }); 
    document.querySelectorAll('.qty-plus').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const span = document.querySelector(`.qty-num[data-id="${id}"]`); if(span) { let val = parseInt(span.innerText) || 1; span.innerText = val+1; } }; }); 
    document.querySelectorAll('.add-to-cart-with-qty').forEach(btn => { btn.onclick = (e) => { e.stopPropagation(); const id = btn.dataset.id; const name = btn.dataset.name; const price = parseInt(btn.dataset.price); const qtySpan = document.querySelector(`.qty-num[data-id="${id}"]`); let quantity = qtySpan ? parseInt(qtySpan.innerText) : 1; addToCart({ id, name, price, quantity }); const resetSpan = document.querySelector(`.qty-num[data-id="${id}"]`); if(resetSpan) resetSpan.innerText = "1"; }; }); 
  }
  function attachCartEvents() { attachQuantityEvents(); document.querySelectorAll('.wsk-cp-product').forEach(card => { card.addEventListener('click', (e) => { if(e.target.closest('.add-to-cart-with-qty') || e.target.closest('.qty-ctrl')) return; const pid = card.dataset.productId; const product = allProducts.find(p => p.id === pid); if(product) openProductModal(product); }); }); }
  function addToCart(product) { let cart = JSON.parse(localStorage.getItem('piercingCart')) || []; const idx = cart.findIndex(i => i.id === product.id); if(idx !== -1) cart[idx].quantity += product.quantity; else cart.push({ ...product, image: product.image || (allProducts.find(p=>p.id===product.id)?.images?.[0]) }); localStorage.setItem('piercingCart', JSON.stringify(cart)); updateCartBadge(); showToast(`✨ ${product.name} ${translations[currentLang].addedToCart}`); }
  function updateCartBadge() { const cart = JSON.parse(localStorage.getItem('piercingCart')) || []; const total = cart.reduce((s,i)=>s+i.quantity,0); document.querySelectorAll('#cartNavBadge').forEach(b=>b.innerText=total); }
  function showToast(msg) { const toast = document.createElement('div'); toast.innerText = msg; toast.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#2C2C2C; color:#fff; padding:8px 18px; border-radius:60px; z-index:2000; font-size:0.8rem;'; document.body.appendChild(toast); setTimeout(()=>toast.remove(),2500); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=> m==='&'?'&amp;':(m==='<'?'&lt;':'&gt;')); }
  async function fetchProducts() { try { const res = await fetch('/api/products'); allProducts = await res.json(); renderFullLayout(allProducts); } catch(err) { document.getElementById('fullLayout').innerHTML = `<div style="text-align:center;padding:2rem;">${translations[currentLang].loadingError}</div>`; } }
  let currentModalProduct = null, modalQty=1;
  function openProductModal(product) { currentModalProduct = product; modalQty=1; document.getElementById('modalQtyVal').innerText = "1"; document.getElementById('modalTitle').innerText = product.name; document.getElementById('modalDesc').innerText = product.description || ''; document.getElementById('modalPrice').innerHTML = `${(product.price/100).toFixed(2)} MAD`; const images = product.images || []; if(images.length){ document.getElementById('modalMainImage').src = images[0]; let thumbsHtml=''; images.forEach((img,idx)=>{ thumbsHtml += `<div class="thumb ${idx===0?'active':''}" data-img="${img}"><img src="${img}" alt=""></div>`; }); document.getElementById('modalThumbnails').innerHTML = thumbsHtml; document.querySelectorAll('.thumb').forEach(t=>{ t.onclick=()=>{ document.querySelectorAll('.thumb').forEach(t2=>t2.classList.remove('active')); t.classList.add('active'); document.getElementById('modalMainImage').src = t.dataset.img; }; }); } else { document.getElementById('modalMainImage').src = 'https://via.placeholder.com/600x400'; document.getElementById('modalThumbnails').innerHTML=''; } document.getElementById('productModal').style.display='flex'; }
  function closeModal() { document.getElementById('productModal').style.display='none'; }
  document.querySelector('.close-modal').addEventListener('click', closeModal); window.addEventListener('click',(e)=>{ if(e.target===document.getElementById('productModal')) closeModal(); });
  document.getElementById('modalQtyMinus').onclick = () => { if(modalQty>1) modalQty--; document.getElementById('modalQtyVal').innerText = modalQty; };
  document.getElementById('modalQtyPlus').onclick = () => { modalQty++; document.getElementById('modalQtyVal').innerText = modalQty; };
  document.getElementById('modalAddToCart').onclick = () => { if(currentModalProduct) addToCart({ id: currentModalProduct.id, name: currentModalProduct.name, price: currentModalProduct.price, quantity: modalQty, image: currentModalProduct.images?.[0] }); closeModal(); };
  function openDrawer() { document.getElementById('drawer').classList.add('open'); document.getElementById('drawerOverlay').classList.add('open'); }
  function closeDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
  document.getElementById('hamburgerBtn').addEventListener('click', openDrawer);
  document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
  document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
  document.getElementById('langToggle').addEventListener('click', () => setLanguage(currentLang === 'en' ? 'fr' : 'en'));
  document.getElementById('bookAppointmentBtn').addEventListener('click', () => window.open('https://wa.me/212781570083?text=Hello%2C%20I%20would%20like%20to%20book%20a%20piercing%20appointment.', '_blank'));
  document.getElementById('locationBtn').addEventListener('click', () => window.open('https://maps.google.com/?q=Marrakech+Mhamid+3+derrière+la+clinique+de+l’aéroport', '_blank'));
  document.getElementById('searchInput').addEventListener('input', (e) => { const term = e.target.value.toLowerCase(); if(term === '') renderFullLayout(allProducts); else { const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term)); renderFullLayout(filtered); } });
  renderCircleSlider(); renderDrawer(); fetchProducts(); updateCartBadge(); setLanguage(currentLang);
</script>
</body>
</html>
